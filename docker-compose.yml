services:

  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data_platform

  airflow-webserver:
    build:
      context: .
      dockerfile: ./airflow/Dockerfile
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: '46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho='
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      PYTHONPATH: /opt/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./input_data:/opt/airflow/data/input
      - ./delta_lake:/opt/airflow/data/delta
      - ./spark:/opt/airflow/spark
      - ./logs:/opt/airflow/logs
    ports:
      - "8081:8080"  # Host 8081 maps to container 8080
    command: airflow webserver
    networks:
      - data_platform

  airflow-scheduler:
    build:
      context: .
      dockerfile: ./airflow/Dockerfile
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: '46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho='
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      PYTHONPATH: /opt/airflow
      SMTP_USER: "prarthana.p.n1234@gmail.com"
      SMTP_PASSWORD: "xwwt rkbp pzss heqt"
    restart: always
    volumes:
      - ./dags:/opt/airflow/dags
      - ./input_data:/opt/airflow/data/input
      - ./delta_lake:/opt/airflow/data/delta
      - ./spark:/opt/airflow/spark
      - ./logs:/opt/airflow/logs
    command: airflow scheduler
    networks:
      - data_platform

  spark-master:
    build: ./spark
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./spark/spark_jobs:/opt/spark_jobs
      - ./input_data:/opt/airflow/data/input
      - ./delta_lake:/opt/airflow/data/delta
    networks:
      - data_platform

  spark-worker:
    build: ./spark
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    volumes:
      - ./spark/spark_jobs:/opt/spark_jobs
      - ./input_data:/opt/airflow/data/input
      - ./delta_lake:/opt/airflow/data/delta
    networks:
      - data_platform

  dashboard:
    build: ./dashboard
    depends_on:
      - spark-master
      - airflow-webserver
    ports:
      - "8501:8501"
    environment:
      AIRFLOW_URL: http://airflow-webserver:8080
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
    volumes:
      - ./dashboard:/app
      - ./delta_lake:/app/data/delta
      - ./logs:/app/logs
      - ./input_data:/app/data/input
    networks:
      - data_platform

volumes:
  postgres_data:

networks:
  data_platform:
    driver: bridge