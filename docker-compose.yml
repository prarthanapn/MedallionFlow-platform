services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data_platform

  airflow-webserver:
    build:
      context: .
      dockerfile: ./airflow/Dockerfile
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: '46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho='
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      PYTHONPATH: /opt/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./spark:/opt/airflow/spark
      - ./logs:/opt/airflow/logs
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    networks:
      - data_platform

  airflow-scheduler:
    build:
      context: .
      dockerfile: ./airflow/Dockerfile
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: '46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho='
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      PYTHONPATH: /opt/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./spark:/opt/airflow/spark
      - ./logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    networks:
      - data_platform

  airflow-init:
    build:
      context: .
      dockerfile: ./airflow/Dockerfile
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: '46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho='
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      PYTHONPATH: /opt/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./spark:/opt/airflow/spark
      - ./logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_started
    command: >
      bash -c "airflow db init && airflow users create
      --username admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com
      --password admin || true"
    networks:
      - data_platform

  # Spark master/worker and dashboard services are temporarily removed
  # to focus on testing the Airflow pipeline. They can be re-added
  # once dedicated Spark and dashboard images are configured.

volumes:
  postgres_data:

networks:
  data_platform:
    driver: bridge
